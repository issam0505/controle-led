<!DOCTYPE html>
<html>
<head>
    <title>Contrôle LED MQTT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body>
    <h1>Contrôle LED via MQTT</h1>
    <button onclick="sendMQTT('ON')">Allumer</button>
    <button onclick="sendMQTT('OFF')">Eteindre</button>

    <script>
        // Configuration : Port 8000 pour WebSocket, useSSL: false
        client = new Paho.MQTT.Client("mqtt-dashboard.com", 8000, "web_client_issam");
        
        client.connect({
            onSuccess: () => console.log("Connecté au broker via WS"),
            useSSL: false 
        });

        function sendMQTT(command) {
            message = new Paho.MQTT.Message(command);
            message.destinationName = "emsi/led_control";
            client.send(message);
        }
    </script>
</body>
</html>
