<!DOCTYPE html>
<html>
<head>
    <title>Contrôle LED MQTT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
</head>
<body>
    <h1>Contrôle LED via MQTT</h1>
    <button onclick="sendMQTT('ON')">Allumer</button>
    <button onclick="sendMQTT('OFF')">Eteindre</button>

   <script>
    // Configuration pour mqtt-dashboard.com
    client = new Paho.MQTT.Client("mqtt-dashboard.com", 8884, "web_client_iss");
    
    // Paramètres de connexion SSL
    client.connect({
        onSuccess: () => console.log("Connecté au broker SSL"),
        useSSL: true, // Très important pour le port 8884
        onFailure: (err) => console.log("Erreur de connexion : ", err)
    });

    function sendMQTT(command) {
        message = new Paho.MQTT.Message(command);
        message.destinationName = "emsi/led_control";
        client.send(message);
    }
</script>
</body>
</html>
